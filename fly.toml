# fly.toml app configuration file generated for the-site-gaming-cafe on 2026-04-05T13:58:48-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'the-site-gaming-cafe'
primary_region = 'bom'

[build]

[env]
  PORT = "3000"
  NODE_ENV = "production"
  TZ = "Asia/Kolkata"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024

[mounts]
  source = "cafe_data"
  destination = "/data"
